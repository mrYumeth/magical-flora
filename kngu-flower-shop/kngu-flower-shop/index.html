<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kngu. - Flower Boutique & Gift Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            orange: '#f25a38', // The vibrant CTA color from the sample
                            dark: '#1c1c1c',   // Footer/Text dark color
                            bgLight: '#f9f9f9' // Light gray backgrounds
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="font-sans text-neutral-800 antialiased bg-white">

    <div class="bg-brand-dark text-white text-xs tracking-wider text-center py-2 px-4 font-light relative">
        All featured product 50% off Shop Now
        <button class="absolute right-4 top-1/2 -translate-y-1/2 hover:opacity-70">&times;</button>
    </div>

    <header class="border-b border-gray-100 sticky top-0 bg-white z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="font-serif text-2xl font-bold tracking-wide">Kngu.</span>
            </div>
            
            <nav class="hidden md:flex items-center gap-8 text-sm uppercase tracking-widest font-medium text-neutral-600">
                <a href="#" class="text-brand-orange">Home</a>
                <a href="#" class="hover:text-brand-orange transition">Shop</a>
                <a href="#" class="hover:text-brand-orange transition">Blog</a>
                <a href="#" class="hover:text-brand-orange transition">Pages</a>
                <a href="#" class="hover:text-brand-orange transition">Contact</a>
            </nav>

            <div class="flex items-center gap-4 text-neutral-700">
                <button class="hover:text-brand-orange transition p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
                <button class="hover:text-brand-orange transition p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </button>
                <button class="hover:text-brand-orange transition p-1 relative">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="absolute -top-1 -right-1 bg-brand-orange text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">3</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section class="py-20 text-center">
            <h1 class="font-serif text-4xl mb-4">Workspace Initialized!</h1>
            <p class="text-gray-500">Ready to build out the Mother's Day Hero Banner next.</p>
        </section>
    </main>

</body>
</html>
